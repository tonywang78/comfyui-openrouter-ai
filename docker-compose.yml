# Conni-X-Pro 全栈 Docker Compose
#
# 依赖说明：
#   容器内：MySQL 8、Redis 7、Spring Boot 后端、Nginx 前端
#   容器外（需自行配置 .env）：阿里云 OSS、OpenRouter API、SMTP 邮件、ComfyUI（GPU 服务）
#
# 快速开始：
#   cp .env.example .env   # 填写密钥
#   docker compose up -d --build
#
# 仅启动基础设施（本地 IDE 开发后端/前端时）：
#   docker compose up -d mysql redis
#
# 访问：
#   前端 http://localhost
#   后端 API http://localhost:9000/api
#   默认管理员见 .env 中 ADMIN_INIT_*

services:
  mysql:
    image: mysql:8.0
    container_name: conni-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ghosts}
      MYSQL_USER: ${DB_USERNAME:-conni}
      MYSQL_PASSWORD: ${DB_PASSWORD:-conni_password_change_me}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./singleton/.sql/table.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: conni-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-redis_password_change_me}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: conni-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-9000}:9000"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-9000}

      # 数据库（覆盖 yml 中的 127.0.0.1）
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ghosts}?useUnicode=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&autoReconnect=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-conni}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-conni_password_change_me}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_me}
      SPRING_DATA_REDIS_DATABASE: 1

      # 管理员初始化
      ADMIN_INIT_EMAIL: ${ADMIN_INIT_EMAIL:-admin@example.com}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:-admin123}

      # 邮件（可选）
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # 阿里云 OSS
      ALI_ACCESS_KEY: ${ALI_ACCESS_KEY:-}
      ALI_SECRET_KEY: ${ALI_SECRET_KEY:-}
      ALI_OSS_BUCKET: ${ALI_OSS_BUCKET:-}
      ALI_OSS_DOMAIN: ${ALI_OSS_DOMAIN:-}
      ALI_OSS_ENDPOINT: ${ALI_OSS_ENDPOINT:-oss-cn-beijing.aliyuncs.com}
      ALI_OSS_SIGNED_URL_EXPIRE_SECONDS: ${ALI_OSS_SIGNED_URL_EXPIRE_SECONDS:-3600}

      # OpenRouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # ComfyUI（默认连宿主机；Linux 需 extra_hosts）
      COMFYUI_URL: ${COMFYUI_URL:-http://host.docker.internal:8188}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/api/notice/get > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: conni-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
